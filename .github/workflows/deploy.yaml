name: Infrastructure Setup

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: mypythonapp.k8s.local
  TF_DIR: terraform

jobs:
  infra:
    runs-on: ubuntu-latest

    steps:

    #  Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    #  AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    #  Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    #  Terraform Init
    - name: Terraform Init
      run: terraform init -reconfigure
      working-directory: ${{ env.TF_DIR }}

    #  Terraform Validate
    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_DIR }}

    #  Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ${{ env.TF_DIR }}

    #  Get Terraform Outputs
    - name: Get Terraform Outputs
      run: |
        echo "KOPS_STATE_STORE=s3://$(terraform output -raw kops_bucket_name)" >> $GITHUB_ENV
        echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_ENV
        echo "SUBNETS=$(terraform output -json private_subnet_ids | jq -r '.[0]')" >> $GITHUB_ENV
        echo "UTILITY_SUBNETS=$(terraform output -json public_subnet_ids | jq -r '.[0]')" >> $GITHUB_ENV
      working-directory: ${{ env.TF_DIR }}

    #  Install tools
    - name: Install Tools (kops + yq)
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

        # kops
        curl -Lo kops https://github.com/kubernetes/kops/releases/latest/download/kops-linux-amd64
        chmod +x kops
        sudo mv kops /usr/local/bin/

        # yq
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq

    #  Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    #  Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v4

    #  Create or Update Cluster
    - name: Create or Update Cluster
      run: |
        if kops get cluster --name=$CLUSTER_NAME --state=$KOPS_STATE_STORE > /dev/null 2>&1; then
          echo "Cluster exists â€” updating..."
        else
          echo "Creating cluster..."

          kops create cluster \
            --name=$CLUSTER_NAME \
            --state=$KOPS_STATE_STORE \
            --network-id=$VPC_ID \
            --subnets=$SUBNETS \
            --utility-subnets=$UTILITY_SUBNETS \
            --control-plane-size=t3.small \
            --node-size=t3.small \
            --node-count=2 \
            --zones=ap-south-1a \
            --topology=private \
            --networking=calico \
            --api-loadbalancer-type=public
        fi

    #  Configure IAM + IMDS
    - name: Configure Cluster (IAM + IMDS)
      run: |
        kops get cluster $CLUSTER_NAME -o yaml --state=$KOPS_STATE_STORE > cluster.yaml

        yq -i '.spec.iam.allowContainerRegistry = true' cluster.yaml
        yq -i '.spec.instanceMetadata.httpPutResponseHopLimit = 2' cluster.yaml

        kops replace -f cluster.yaml --state=$KOPS_STATE_STORE

    #  Apply cluster
    - name: Apply Cluster
      run: |
        kops update cluster \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --yes

        kops export kubecfg \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --admin

    #  Attach IAM policy (CRITICAL FIX)
    - name: Attach Secrets Manager Policy to Nodes
      run: |
        ROLE_NAME=$(aws iam list-roles \
          --query "Roles[?contains(RoleName, 'nodes.${CLUSTER_NAME}')].RoleName" \
          --output text)

        echo "Node Role: $ROLE_NAME"

        aws iam attach-role-policy \
          --role-name $ROLE_NAME \
          --policy-arn arn:aws:iam::aws:policy/SecretsManagerReadWrite

    #  Rolling update (apply IAM)
    - name: Rolling Update
      run: |
        kops rolling-update cluster \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --yes

        echo "Waiting for nodes..."

        for i in {1..10}; do
          READY=$(kubectl get nodes --no-headers | grep -c " Ready" || true)
          if [ "$READY" -ge 3 ]; then
            echo "Nodes ready"
            break
          fi
          sleep 30
        done

    #  Validate cluster
    - name: Validate Cluster
      run: |
        for i in {1..5}; do
          kops validate cluster \
            --name=$CLUSTER_NAME \
            --state=$KOPS_STATE_STORE \
            --wait=5m && break
          sleep 60
        done

    #  Install Envoy Gateway
    - name: Install Envoy Gateway
      run: |
        helm upgrade --install eg oci://docker.io/envoyproxy/gateway-helm \
          --version v1.0.0 \
          -n envoy-gateway-system \
          --create-namespace

    #  Install External Secrets Operator
    - name: Install External Secrets Operator
      run: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update

        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets \
          --create-namespace \
          --wait \
          --timeout=120s

    #  Restart ESO pods
    - name: Restart External Secrets Pods
      run: |
        kubectl delete pod -n external-secrets --all || true

    #  Wait for External Secret
    - name: Wait for External Secret
      run: |
        for i in {1..10}; do
          STATUS=$(kubectl get externalsecret db-credentials -n default -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")

          if [ "$STATUS" = "True" ]; then
            echo "Secret synced successfully"
            exit 0
          fi

          echo "Waiting for secret..."
          sleep 20
        done

        kubectl describe externalsecret db-credentials -n default
        exit 1