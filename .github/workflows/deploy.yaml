name: Infrastructure Setup

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: mypythonapp.k8s.local
  TF_DIR: terraform

jobs:
  infra:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔹 Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 🔹 Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 🔹 Terraform Init
    - name: Terraform Init
      run: terraform init -reconfigure
      working-directory: ${{ env.TF_DIR }}

    # 🔹 Terraform Validate
    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_DIR }}

    # 🔹 Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ${{ env.TF_DIR }}

    # 🔹 Get Terraform Outputs
    - name: Get Terraform Outputs
      run: |
        echo "KOPS_STATE_STORE=s3://$(terraform output -raw kops_bucket_name)" >> $GITHUB_ENV
        echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_ENV
        echo "SUBNETS=$(terraform output -json private_subnet_ids | jq -r '.[0]')" >> $GITHUB_ENV
        echo "UTILITY_SUBNETS=$(terraform output -json public_subnet_ids | jq -r '.[0]')" >> $GITHUB_ENV
      working-directory: ${{ env.TF_DIR }}

    # 🔹 Install kops
    - name: Install kops
      run: |
        curl -Lo kops https://github.com/kubernetes/kops/releases/latest/download/kops-linux-amd64
        chmod +x kops
        sudo mv kops /usr/local/bin/

    # 🔹 Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # 🔹 Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v4

    # 🔹 Create or Update Cluster
    - name: Create or Update Cluster
      run: |
        if kops get cluster --name=$CLUSTER_NAME --state=$KOPS_STATE_STORE > /dev/null 2>&1; then
          echo "Cluster exists — updating..."
          echo "CLUSTER_EXISTS=yes" >> $GITHUB_ENV

          kops update cluster \
            --name=$CLUSTER_NAME \
            --state=$KOPS_STATE_STORE \
            --yes

        else
          echo "Cluster not found — creating..."
          echo "CLUSTER_EXISTS=no" >> $GITHUB_ENV

          kops create cluster \
            --name=$CLUSTER_NAME \
            --state=$KOPS_STATE_STORE \
            --network-id=$VPC_ID \
            --subnets=$SUBNETS \
            --utility-subnets=$UTILITY_SUBNETS \
            --control-plane-size=t3.small \
            --node-size=t3.small \
            --node-count=2 \
            --zones=ap-south-1a \
            --topology=private \
            --networking=calico \
            --api-loadbalancer-type=public
        fi

    # 🔥 Apply IAM + IMDS properly (IMPORTANT FIX)
    - name: Configure Cluster (IAM + IMDS)
      run: |
        kops get cluster $CLUSTER_NAME -o yaml --state=$KOPS_STATE_STORE > cluster.yaml

        # Add IAM policy for External Secrets
        yq -i '.spec.iam.allowContainerRegistry = true' cluster.yaml
        yq -i '.spec.iam.externalPolicies.node += ["arn:aws:iam::aws:policy/SecretsManagerReadWrite"]' cluster.yaml

        # Fix IMDS (Calico issue)
        yq -i '.spec.instanceMetadata.httpPutResponseHopLimit = 2' cluster.yaml

        kops replace -f cluster.yaml --state=$KOPS_STATE_STORE

    # 🔹 Apply cluster
    - name: Apply Cluster
      run: |
        kops update cluster \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --yes

        kops export kubecfg \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --admin

    # 🔹 Rolling Update
    - name: Rolling Update
      run: |
        kops rolling-update cluster \
          --name=$CLUSTER_NAME \
          --state=$KOPS_STATE_STORE \
          --yes

    # 🔹 Validate Cluster (with retry)
    - name: Validate Cluster
      run: |
        for i in {1..5}; do
          kops validate cluster \
            --name=$CLUSTER_NAME \
            --state=$KOPS_STATE_STORE \
            --wait=5m && break
          echo "Retrying validation..."
          sleep 60
        done

    # 🔹 Install Envoy Gateway
    - name: Install Envoy Gateway
      run: |
        helm install eg oci://docker.io/envoyproxy/gateway-helm \
          --version v1.0.0 \
          -n envoy-gateway-system \
          --create-namespace || true

    # 🔹 Install External Secrets Operator
    - name: Install External Secrets Operator
      run: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update

        if helm list -n external-secrets | grep external-secrets > /dev/null 2>&1; then
          echo "ESO already installed"
        else
          helm install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --wait \
            --timeout=120s
        fi